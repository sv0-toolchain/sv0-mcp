services:
  neo4j:
    image: neo4j:5-community
    container_name: sv0-graph
    ports:
      - "7475:7474"     # HTTP (avoid conflict with default 7474)
      - "7688:7687"     # Bolt (avoid conflict with default 7687)
    environment:
      - NEO4J_AUTH=neo4j/sv0-graph-dev
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs

volumes:
  neo4j-data:
  neo4j-logs:
