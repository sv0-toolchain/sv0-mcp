# Neo4j + meta-repo progress dashboard (task/*.Rmd digest UI).
#
# Default bind mount: parent of this directory = sv0-toolchain root when sv0-mcp is a
# submodule. Override with SV0_MCP_TOOLCHAIN_ROOT=/absolute/path/to/sv0-toolchain.
#
# Progress UI host port defaults to 8766 so it does not collide with `uv run sv0-mcp serve`,
# which spawns the same server on 127.0.0.1:8765 on the host. Override with
# SV0_MCP_PROGRESS_DASHBOARD_HOST_PORT.

services:
  neo4j:
    image: neo4j:5-community
    container_name: sv0-graph
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
    ports:
      # Host ports (left) are chosen to avoid colliding with another Neo4j on 7474/7687.
      # If these still clash, change the left side only, then set SV0_MCP_NEO4J_URI (and
      # Cursor NEO4J_URI for mcp-neo4j-cypher) to bolt://localhost:<your-bolt-host-port>.
      - "7475:7474"     # HTTP browser
      - "7688:7687"     # Bolt
    environment:
      - NEO4J_AUTH=neo4j/sv0-graph-dev
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
      # Dev-friendly caps so a laptop can run graph + dashboard alongside IDEs.
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=128M
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs

  progress-dashboard:
    image: python:3.12-slim
    container_name: sv0-progress-dashboard
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    restart: unless-stopped
    working_dir: /workspace
    volumes:
      - ${SV0_MCP_TOOLCHAIN_ROOT:-..}:/workspace:ro
    command:
      - python3
      - scripts/progress_dashboard_server.py
      - --root
      - /workspace
      - --host
      - "0.0.0.0"
      - --port
      - "8765"
      - --refresh-seconds
      - ${SV0_MCP_PROGRESS_DASHBOARD_REFRESH:-120}
    ports:
      - "${SV0_MCP_PROGRESS_DASHBOARD_HOST_PORT:-8766}:8765"

volumes:
  neo4j-data:
  neo4j-logs:
